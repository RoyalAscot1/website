databases:
  - name: investment-advisor-db
    databaseName: investment_advisor
    user: investment_advisor
    plan: free

services:
  - type: web
    name: investment-advisor-api
    runtime: python
    rootDir: api
    plan: free
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: investment-advisor-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: CLERK_JWKS_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false

  - type: static
    name: investment-advisor-frontend
    buildCommand: npm install --production=false && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        sync: false
